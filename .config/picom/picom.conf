# Rounded corners
corner-radius:          3;

# Opacity
opacity-rule = [
];

# Shadows
shadow                  : true;
xinerama-shadow-crop    : true;
shadow-radius           : 40;
shadow-offset-x         : -20;
shadow-offset-y         : -20;
shadow-opacity          : 0.35;
shadow-exclude = [
      "class_g = 'lattedock'",
      "class_g = 'firefox' && argb",
      "class_g = 'transparent'"
];


# Fading
fading                  : true;
fade-delta              : 6;
fade-in-step            : 0.5;
fade-out-step           : 0.5;

# Other
backend                 : "xrender";
vsync                   : true;
use-damage              : "false";
glx-copy-from-front     : false;
glx-no-rebind-pixmap    : true;
glx-no-stencil          : true;
unredir-if-possible     : false;
xrender-sync            : false;
xrender-sync-fence      : false;
mark-wmwin-focused      : true;
mark-ovredir-focused    : false;
detect-rounded-corners  : true;
detect-client-opacity   : true;
refresh-rate            : 60;

wintypes:
{
  dropdown_menu = { shadow = true; full-shadow = true;};
  popup_menu = { shadow = true; full-shadow = true; opacity = 1;};
  menu = { shadow = true; full-shadow = true;};
  dnd = { opacity = 1; };
};
